<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4F46E5">
<title>RumahBersih</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="https://serabut-id.github.io/rumahbersih/favicon.svg">
<link rel="icon" type="image/png" href="https://serabut-id.github.io/rumahbersih/icon-192.png">
<link rel="apple-touch-icon" href="https://serabut-id.github.io/rumahbersih/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
:root {
  --primary:#4F46E5; --accent:#10B981; --bg:#F4F6FB;
  --fg:#1E2A44; --muted:#EEF1F7; --border:#E4E9F2; --danger:#DC2626;
}
* { box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }
body { font-family:'Plus Jakarta Sans',system-ui,sans-serif; background:var(--bg); color:var(--fg); min-height:100vh; font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased; overscroll-behavior-y:contain; }
main, header { user-select:none; -webkit-user-select:none; }
input, select { user-select:text; -webkit-user-select:text; }
header { background:var(--primary); color:#fff; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
header h1 { font-size:20px; font-weight:700; }
header .sub { font-size:13px; opacity:.85; font-weight:500; }
main { padding:16px 16px calc(110px + env(safe-area-inset-bottom)); max-width:560px; margin:0 auto; }
/* nav floating ala Threads/Instagram: pill melayang, mengecil saat scroll ke bawah */
nav { position:fixed; bottom:calc(12px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); background:rgba(255,255,255,.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:99px; display:flex; gap:2px; z-index:20; padding:4px; box-shadow:0 8px 24px rgba(30,42,68,.14); transition:transform .25s ease, opacity .25s ease; }
nav.mini { transform:translateX(-50%) scale(.7); opacity:.65; }
nav button { border:none; background:none; font:inherit; font-size:10.5px; font-weight:700; color:var(--fg); opacity:.5; padding:6px 16px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:1px; border-radius:99px; transition:opacity .15s ease, background .2s ease; }
nav button svg { width:18px; height:18px; }
nav button.active { opacity:1; color:var(--primary); background:var(--muted); }
nav button:active { transform:scale(.95); }
@keyframes pagein { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
main.pagein { animation:pagein .22s ease; }
@keyframes rowin { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
main.pagein .card, main.pagein .task, main.pagein .stats, main.pagein .arow, main.pagein .dayrow { animation:rowin .3s ease both; }
main.pagein > :nth-child(2) { animation-delay:.03s; }
main.pagein > :nth-child(3) { animation-delay:.06s; }
main.pagein > :nth-child(4) { animation-delay:.09s; }
main.pagein > :nth-child(5) { animation-delay:.12s; }
main.pagein > :nth-child(6) { animation-delay:.15s; }
.iconbtn { background:rgba(255,255,255,.15); border:none; color:#fff; border-radius:12px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s ease; }
.iconbtn:active { background:rgba(255,255,255,.3); }
.card { background:#fff; border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:16px; }
.card .label { display:flex; justify-content:space-between; font-size:14px; font-weight:600; margin-bottom:8px; }
.sticky { position:sticky; top:84px; z-index:5; box-shadow:0 4px 12px rgba(8,145,178,.12); }
.bar { background:var(--muted); border-radius:99px; height:10px; overflow:hidden; }
.bar > div { background:var(--accent); height:100%; border-radius:99px; transition:width .3s ease; }
.salary { text-align:center; padding:20px 16px 12px; }
.salary .slabel { font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; opacity:.55; margin-bottom:4px; }
.salary .amount { font-size:32px; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; }
.sgrid { display:flex; margin-top:14px; border-top:1px solid var(--muted); padding-top:12px; }
.sgrid > div { flex:1; display:flex; flex-direction:column; gap:1px; }
.sgrid > div + div { border-left:1px solid var(--muted); }
.sgrid b { font-size:15px; font-weight:700; font-variant-numeric:tabular-nums; }
.sgrid span { font-size:11.5px; font-weight:600; opacity:.55; }
.task { background:#fff; border:1px solid var(--border); border-radius:16px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:14px; cursor:pointer; min-height:60px; transition:transform .1s ease; }
.task:active { transform:scale(.97); }
.task.done .check { animation:pop .25s ease; }
@keyframes pop { 50% { transform:scale(1.25); } }
.task .check { width:28px; height:28px; border-radius:99px; border:2px solid var(--primary); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .15s ease; }
.task.done .check { background:var(--accent); border-color:var(--accent); }
.task .check svg { opacity:0; stroke:#fff; }
.task.done .check svg { opacity:1; }
.task .name { font-weight:600; flex:1; }
.task .desc { font-size:13px; font-weight:400; opacity:.65; margin-top:2px; }
.task.done .name { text-decoration:line-through; opacity:.5; }
.stats { display:flex; gap:10px; margin-bottom:16px; }
.stat { flex:1; background:#fff; border:1px solid var(--border); border-radius:16px; padding:12px; text-align:center; }
.stat .n { font-size:24px; font-weight:700; }
.stat.ok .n { color:var(--accent); }
.stat .t { font-size:12px; font-weight:600; opacity:.65; }
.task .freq { font-size:12px; font-weight:500; color:var(--primary); background:var(--bg); border-radius:99px; padding:3px 10px; flex-shrink:0; }
.empty { text-align:center; padding:48px 16px; opacity:.6; font-weight:500; }
h2 { font-size:16px; font-weight:700; margin:20px 0 10px; }
table { width:100%; border-collapse:collapse; font-size:14px; }
th, td { text-align:left; padding:8px 4px; border-bottom:1px solid var(--muted); }
th { font-size:12px; text-transform:uppercase; letter-spacing:.03em; opacity:.7; }
td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
.arow { background:#fff; border:1px solid var(--border); border-radius:16px; padding:12px 16px; margin-bottom:10px; display:flex; align-items:center; gap:10px; }
.arow .name { font-weight:600; flex:1; min-width:0; }
.arow .meta { font-size:13px; color:var(--primary); font-weight:500; }
.arow button { border:none; background:var(--muted); color:var(--fg); border-radius:10px; width:36px; height:44px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; padding:0; }
.arow button.del { color:var(--danger); }
.arow button.edit { color:var(--primary); }
.arow button:disabled { opacity:.35; }
.arow.editing { outline:2px solid var(--primary); }
form { background:#fff; border:1px solid var(--border); border-radius:16px; padding:16px; display:flex; flex-direction:column; gap:12px; margin-bottom:16px; }
label { font-size:14px; font-weight:600; display:flex; flex-direction:column; gap:6px; }
/* 16px minimum: input font <16px memicu auto-zoom di iOS */
input, select { font:inherit; font-size:16px; padding:12px; border:1px solid var(--border); border-radius:12px; background:var(--bg); color:var(--fg); width:100%; min-height:48px; }
input:focus, select:focus { outline:2px solid var(--primary); outline-offset:1px; }
.btn { font:inherit; font-weight:700; background:var(--primary); color:#fff; border:none; border-radius:12px; padding:14px; cursor:pointer; min-height:48px; transition:opacity .15s ease; }
.btn:active { transform:scale(.98); opacity:.85; }
.btn:disabled { opacity:.7; }
.iconbtn:active { transform:scale(.92); }
.btn.loading { color:transparent; position:relative; pointer-events:none; }
.btn.loading::after { content:''; position:absolute; inset:0; margin:auto; width:20px; height:20px; border:3px solid rgba(255,255,255,.35); border-top-color:#fff; border-radius:99px; animation:spin .7s linear infinite; }
.btn.ghost.loading::after { border-color:rgba(22,78,99,.25); border-top-color:var(--fg); }
@keyframes spin { to { transform:rotate(360deg); } }
.btn.ghost { background:var(--muted); color:var(--fg); }
.row2 { display:flex; gap:10px; }
.row2 > * { flex:1; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--fg); color:#fff; padding:10px 20px; border-radius:99px; font-size:14px; font-weight:600; opacity:0; transition:opacity .2s ease; pointer-events:none; z-index:50; }
.toast.show { opacity:1; }
.overlay { position:fixed; inset:0; background:rgba(22,78,99,.5); display:none; align-items:flex-end; justify-content:center; z-index:40; }
.overlay.show { display:flex; }
.sheet { background:#fff; border-radius:24px 24px 0 0; padding:24px 20px calc(24px + env(safe-area-inset-bottom)); width:100%; max-width:560px; animation:up .25s ease; }
@keyframes up { from { transform:translateY(40px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.sheet h3 { font-size:18px; font-weight:700; margin-bottom:4px; }
.sheet p { font-size:14px; opacity:.7; margin-bottom:16px; }
.sheet .pin { text-align:center; font-size:24px; letter-spacing:.4em; font-weight:700; }
.sheet .actions { display:flex; gap:10px; margin-top:16px; }
.sheet .actions .btn { flex:1; }
.btn.danger { background:var(--danger); }
.shake { animation:shake .3s ease; }
@keyframes shake { 25% { transform:translateX(-6px); } 75% { transform:translateX(6px); } }
.loader { text-align:center; padding:64px 0; opacity:.6; font-weight:600; }
.fab { position:fixed; bottom:calc(88px + env(safe-area-inset-bottom)); left:12px; right:12px; max-width:536px; margin:0 auto; background:#fff; border:1px solid var(--border); border-radius:18px; box-shadow:0 10px 30px rgba(22,78,99,.18); display:flex; align-items:center; gap:12px; padding:12px 14px; z-index:15; animation:fabin .3s ease; }
.fab[hidden] { display:none; }
.fab .ficon { width:44px; height:44px; border-radius:12px; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.fab .ftext { flex:1; min-width:0; line-height:1.3; }
.fab .ftext b { font-size:14.5px; display:block; }
.fab .ftext span { font-size:12.5px; opacity:.6; font-weight:500; }
.fab .fgo { border:none; font:inherit; font-size:14px; font-weight:700; background:var(--primary); color:#fff; border-radius:99px; padding:10px 18px; cursor:pointer; flex-shrink:0; }
.fab .fgo:active { transform:scale(.96); }
.fab .fx { border:none; background:none; color:var(--fg); opacity:.45; width:32px; height:32px; cursor:pointer; font-size:15px; flex-shrink:0; border-radius:99px; }
@keyframes fabin { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.login { text-align:center; padding-top:9vh; }
.login .logo { width:88px; height:88px; border-radius:28px; display:block; margin:0 auto 20px; box-shadow:0 8px 24px rgba(79,70,229,.25); }
.login h2 { font-size:26px; margin:0 0 4px; }
.login p { opacity:.65; font-weight:500; margin-bottom:32px; }
.login .btn { width:100%; margin-bottom:12px; font-size:17px; padding:16px; }
.linkbtn { border:none; background:none; font:inherit; font-size:14.5px; font-weight:600; color:var(--primary); cursor:pointer; padding:10px; }
.menuitem { width:100%; text-align:left; border:1px solid var(--border); background:#fff; border-radius:16px; padding:16px; margin-bottom:12px; display:flex; align-items:center; gap:14px; cursor:pointer; font:inherit; color:var(--fg); transition:transform .1s ease; }
.menuitem:active { transform:scale(.98); }
.menuitem .micon { width:46px; height:46px; border-radius:14px; background:var(--muted); color:var(--primary); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.menuitem .mtext { flex:1; min-width:0; }
.menuitem .mtext b { font-size:15.5px; display:block; }
.menuitem .mtext span { font-size:13px; opacity:.6; font-weight:500; }
.menuitem .chev { opacity:.35; flex-shrink:0; }
.backbtn { border:none; background:none; font:inherit; font-size:14.5px; font-weight:700; color:var(--primary); cursor:pointer; display:flex; align-items:center; gap:4px; padding:0 0 14px; }
.steps { margin:0; padding-left:20px; font-size:14.5px; }
.steps li { margin:8px 0; }
.skel { background:#fff; border:1px solid var(--border); border-radius:16px; margin-bottom:10px; position:relative; overflow:hidden; }
.skel::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg, transparent, rgba(165,243,252,.35), transparent); animation:shimmer 1.2s infinite; }
@keyframes shimmer { from { transform:translateX(-100%); } to { transform:translateX(100%); } }
.dayrow { background:#fff; border:1px solid var(--border); border-radius:16px; padding:0 16px; margin-bottom:8px; }
.dayrow summary { display:flex; justify-content:space-between; align-items:center; font-weight:700; font-size:14px; padding:13px 0; cursor:pointer; list-style:none; min-height:48px; }
.dayrow summary::-webkit-details-marker { display:none; }
.dayrow[open] summary { border-bottom:1px solid var(--muted); margin-bottom:8px; }
.dayrow ul, .dayrow .none { padding-bottom:12px; }
.dtag { font-size:12.5px; font-weight:700; border-radius:99px; padding:4px 12px; background:var(--muted); color:var(--fg); font-variant-numeric:tabular-nums; }
.dtag.ok { background:#D1FAE5; color:#065F46; }
.dtag.part { background:#FEF3C7; color:#92400E; }
.dtag.bad { background:#FEE2E2; color:#991B1B; }
.dtag.off { background:var(--bg); color:var(--primary); }
.dayrow ul { margin:0; padding-left:18px; font-size:13.5px; }
.dayrow li { margin:2px 0; }
.dayrow li .who { opacity:.55; }
.dayrow li.miss { color:var(--danger); }
.dayrow .none { font-size:13.5px; opacity:.6; }
.chart { display:flex; gap:8px; align-items:flex-end; height:130px; padding-top:8px; }
.cbar { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:4px; }
.cbar .fill { width:100%; max-width:34px; background:var(--accent); border-radius:8px 8px 4px 4px; min-height:4px; transition:height .4s ease; }
.cbar.today .fill { background:var(--primary); }
.cbar .v { font-size:11px; font-weight:700; }
.cbar .l { font-size:11px; font-weight:600; opacity:.6; }
.hrow { display:flex; align-items:center; gap:10px; margin:10px 0; }
.hrow .hl { width:64px; font-size:13px; font-weight:600; flex-shrink:0; }
.hrow .htrack { flex:1; background:var(--muted); border-radius:99px; height:22px; overflow:hidden; }
.hrow .hfill { background:var(--primary); height:100%; border-radius:99px; min-width:4px; transition:width .4s ease; }
.hrow .hv { font-size:12.5px; font-weight:700; width:88px; text-align:right; flex-shrink:0; font-variant-numeric:tabular-nums; }
@media (prefers-reduced-motion:reduce) { * { transition:none !important; } }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:11px">
    <img src="https://serabut-id.github.io/rumahbersih/icon-192.png" alt="" width="38" height="38" style="border-radius:11px;flex-shrink:0">
    <div><h1>RumahBersih</h1><div class="sub" id="subtitle"></div></div>
  </div>
  <button class="iconbtn" id="modeBtn" aria-label="Ganti akun">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
  </button>
</header>
<main id="app">
  <div class="skel" style="height:90px"></div>
  <div class="skel" style="height:64px"></div>
  <div class="skel" style="height:60px"></div>
  <div class="skel" style="height:60px"></div>
  <div class="skel" style="height:60px"></div>
</main>
<div class="fab" id="installFab" hidden>
  <img class="ficon" src="https://serabut-id.github.io/rumahbersih/icon-192.png" alt="" width="44" height="44" style="border-radius:12px">
  <div class="ftext"><b>RumahBersih</b><span>Pasang di layar utama HP</span></div>
  <button class="fgo" onclick="doInstall()">Pasang</button>
  <button class="fx" aria-label="Tutup" onclick="localStorage.installDismissed=1;updateFab()">✕</button>
</div>

<nav>
  <button id="tabHome" class="active" onclick="setTab('home')" aria-label="Beranda">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Beranda
  </button>
  <button id="tabReport" onclick="setTab('report')" aria-label="Laporan">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Laporan
  </button>
</nav>
<div class="toast" id="toast"></div>

<div class="overlay" id="resetModal">
  <div class="sheet">
    <h3>Reset PIN</h3>
    <p>Untuk akun ART: masukkan nama dan PIN baru, langsung berlaku. Akun admin direset lewat admin lain.</p>
    <form onsubmit="doReset(event)">
      <label>Nama <input id="rName" required maxlength="30" placeholder="cth: Hayati"></label>
      <label style="margin-top:10px">PIN baru <input id="rPin" required type="password" inputmode="numeric" maxlength="8" placeholder="cth: 5678"></label>
      <div class="actions">
        <button class="btn ghost" type="button" onclick="$('resetModal').classList.remove('show')">Batal</button>
        <button class="btn" type="submit">Simpan PIN</button>
      </div>
    </form>
  </div>
</div>

<div class="overlay" id="installModal">
  <div class="sheet">
    <h3>Pasang di Layar Utama</h3>
    <p id="installSub">Supaya gampang dibuka seperti aplikasi biasa.</p>
    <ol class="steps" id="installSteps"></ol>
    <div class="actions">
      <button class="btn" onclick="$('installModal').classList.remove('show')">Mengerti</button>
    </div>
  </div>
</div>

<div class="overlay" id="delModal">
  <div class="sheet">
    <h3>Hapus tugas?</h3>
    <p id="delName"></p>
    <div class="actions">
      <button class="btn ghost" onclick="closeDel()">Batal</button>
      <button class="btn danger" id="delConfirm">Hapus</button>
    </div>
  </div>
</div>

<script>
const HARI = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const BULAN = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
const CHECK = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>';
const TRASH = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
const PENCIL = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>';
const UP = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>';
const DOWN = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
let db = null;
let admin = false;
const $ = id => document.getElementById(id);
const todayKey = () => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); };
const rupiah = n => 'Rp ' + Number(n).toLocaleString('id-ID');
const monthLabel = m => BULAN[+m.slice(5,7)-1] + ' ' + m.slice(0,4);

// dual-mode: di dalam GAS pakai google.script.run, di PWA (GitHub Pages) pakai fetch ke API
const API = 'https://script.google.com/macros/s/AKfycbwmLEvLcsCVBglutd35hHaJJHt7inTcPfbs82InaRpBYoT68BhgoJx46QsuxBb79HGM/exec';
async function call(fn, ...args) {
  if (typeof google !== 'undefined' && google.script) {
    return new Promise((ok, err) => google.script.run.withSuccessHandler(ok).withFailureHandler(err)[fn](...args));
  }
  const r = await fetch(API, { method: 'POST', body: JSON.stringify({ fn, args }) });
  const out = await r.json();
  if (out && out.error) throw new Error(out.error);
  return out;
}
function toast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

function freqLabel(t) {
  if (t.freq === 'harian') return 'Harian';
  if (t.freq === '2harian') return 'Per 2 hari';
  if (t.freq === '3harian') return 'Per 3 hari';
  if (t.freq === 'mingguan') return 'Tiap ' + HARI[t.day];
  return 'Tiap tgl ' + t.day;
}
function dueOn(t, dateStr) {
  if (t.start && t.start > dateStr) return false;
  const d = new Date(dateStr + 'T00:00:00');
  const gap = t.start ? Math.round((d - new Date(t.start + 'T00:00:00')) / 86400000) : 0;
  if (t.freq === 'harian') return true;
  if (t.freq === '2harian') return gap % 2 === 0;
  if (t.freq === '3harian') return gap % 3 === 0;
  if (t.freq === 'mingguan') return d.getDay() === t.day;
  return d.getDate() === t.day;
}
function dueToday(t) { return dueOn(t, todayKey()); }
// client-side report: instant update, no server round-trip.
// with startDate: workdays = calendar days since mulai kerja; without: days with >=1 check
function calcReport() {
  const byMonth = {};
  db.done.forEach(d => {
    const m = d.date.slice(0, 7);
    byMonth[m] = byMonth[m] || { days: {}, checks: 0 };
    byMonth[m].days[d.date] = true;
    byMonth[m].checks++;
  });
  if (!db.startDate) {
    return Object.keys(byMonth).sort().reverse().slice(0, 6).map(m => {
      const workDays = Object.keys(byMonth[m].days).length;
      return { month: m, workDays, checks: byMonth[m].checks, salary: workDays * db.wage };
    });
  }
  const today = todayKey();
  const out = [];
  const cur = new Date(db.startDate.slice(0, 7) + '-01T00:00:00');
  while (out.length < 12) {
    const m = cur.getFullYear() + '-' + String(cur.getMonth() + 1).padStart(2, '0');
    if (m > today.slice(0, 7)) break;
    const monthEnd = new Date(cur.getFullYear(), cur.getMonth() + 1, 0).getDate();
    const from = m === db.startDate.slice(0, 7) ? +db.startDate.slice(8) : 1;
    const to = m === today.slice(0, 7) ? +today.slice(8) : monthEnd;
    const workDays = countWorkDays(cur.getFullYear(), cur.getMonth(), from, to);
    out.push({ month: m, workDays, checks: byMonth[m] ? byMonth[m].checks : 0, salary: workDays * db.wage });
    cur.setMonth(cur.getMonth() + 1);
  }
  return out.reverse().slice(0, 6);
}

// hari kerja = tanggal from..to di bulan itu, MINUS hari Minggu
function countWorkDays(year, month, from, to) {
  let n = 0;
  for (let d = from; d <= to; d++) {
    if (new Date(year, month, d).getDay() !== 0) n++;
  }
  return n;
}
function doneToday() {
  const key = todayKey();
  return db.done.filter(d => d.date === key).map(d => d.taskId);
}

function chartWeek() {
  const bars = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const due = db.tasks.filter(t => dueOn(t, key)).length;
    const doneN = db.done.filter(x => x.date === key).length;
    const pct = due ? Math.min(100, Math.round(doneN / due * 100)) : 0;
    bars.push(`<div class="cbar ${i === 0 ? 'today' : ''}">
      <div class="v">${due ? pct + '%' : '–'}</div>
      <div class="fill" style="height:${Math.max(4, pct)}%"></div>
      <div class="l">${HARI[d.getDay()].slice(0,3)}<br>${d.getDate()}</div></div>`);
  }
  return `<div class="card"><div class="label"><span>Tugas Selesai · 7 Hari</span></div><div class="chart">${bars.join('')}</div></div>`;
}

function chartMonth() {
  if (!db.report.length) return '';
  const max = Math.max(...db.report.map(r => r.salary), 1);
  const rows = [...db.report].reverse().map(r => `<div class="hrow">
    <div class="hl">${monthLabel(r.month)}</div>
    <div class="htrack"><div class="hfill" style="width:${Math.round(r.salary / max * 100)}%"></div></div>
    <div class="hv">${rupiah(r.salary)}</div></div>`).join('');
  return `<div class="card"><div class="label"><span>Estimasi Gaji per Bulan</span></div>${rows}</div>`;
}

let repMonth = null;

function dailyDetail() {
  const today = todayKey();
  const months = db.report.map(r => r.month);
  if (!months.length) return '<div class="empty">Belum ada data.</div>';
  if (!repMonth || !months.includes(repMonth)) repMonth = months[0];
  const sel = `<select id="repMonth" onchange="repMonth=this.value;render()" style="margin-bottom:12px">
    ${months.map(m => `<option value="${m}" ${m === repMonth ? 'selected' : ''}>${monthLabel(m)}</option>`).join('')}</select>`;

  const [y, mo] = [+repMonth.slice(0, 4), +repMonth.slice(5, 7) - 1];
  const lastDay = repMonth === today.slice(0, 7) ? +today.slice(8) : new Date(y, mo + 1, 0).getDate();
  const days = [];
  for (let d = lastDay; d >= 1; d--) {
    const key = repMonth + '-' + String(d).padStart(2, '0');
    if (db.startDate && key < db.startDate) break;
    const date = new Date(y, mo, d);
    const minggu = date.getDay() === 0;
    const due = db.tasks.filter(t => dueOn(t, key));
    const doneRows = db.done.filter(x => x.date === key);
    const doneIds = doneRows.map(x => x.taskId);
    const selesai = due.filter(t => doneIds.includes(t.id));
    const belum = due.filter(t => !doneIds.includes(t.id));
    const badge = minggu ? '<span class="dtag off">Libur</span>'
      : !due.length ? '<span class="dtag">–</span>'
      : `<span class="dtag ${belum.length === 0 ? 'ok' : (selesai.length ? 'part' : 'bad')}">${selesai.length}/${due.length}</span>`;
    const label = (key === today ? 'Hari ini · ' : '') + HARI[date.getDay()] + ', ' + d + ' ' + BULAN[mo];
    days.push(`<details class="dayrow">
      <summary><span>${label}</span>${badge}</summary>
      ${selesai.length ? '<ul>' + selesai.map(t => { const w = doneRows.find(x => x.taskId === t.id); return `<li>${t.name}${w && w.who ? ` <span class="who">— ${w.who}</span>` : ''}</li>`; }).join('') + '</ul>' : ''}
      ${belum.length && !minggu ? '<ul>' + belum.map(t => `<li class="miss">${t.name} (belum)</li>`).join('') + '</ul>' : ''}
      ${!due.length || (minggu && !selesai.length) ? '<div class="none">' + (minggu ? 'Hari libur.' : 'Tidak ada tugas terjadwal.') + '</div>' : ''}
    </details>`);
  }
  return sel + days.join('');
}

let toggleSeq = 0;
async function toggle(el, id) {
  // optimistic: flip instantly, sync to sheet in background
  const key = todayKey();
  const i = db.done.findIndex(d => d.date === key && d.taskId === id);
  i >= 0 ? db.done.splice(i, 1) : db.done.push({ date: key, taskId: id, who: localStorage.artName || '' });
  render();
  const seq = ++toggleSeq;
  try {
    const fresh = await call('toggleDone', id, localStorage.artName || '');
    if (seq === toggleSeq) { db = fresh; render(); }
  } catch (e) {
    if (seq === toggleSeq) {
      const j = db.done.findIndex(d => d.date === key && d.taskId === id);
      j >= 0 ? db.done.splice(j, 1) : db.done.push({ date: key, taskId: id, who: localStorage.artName || '' });
      render(); toast('Gagal menyimpan, coba lagi');
    }
  }
}

      <div class="row2">
        ${editUserId ? '<button class="btn ghost" type="button" onclick="editUserId=null;render()">Batal</button>' : ''}
        <button class="btn" type="submit">${editUserId ? 'Simpan Perubahan' : 'Tambah Pengguna'}</button>
      </div>
    </form>
    ${db.users.map(u => {
      const lastAdmin = u.role === 'admin' && db.users.filter(x => x.role === 'admin').length === 1;
      return `<div class="arow ${u.id === editUserId ? 'editing' : ''}">
      <div class="name">${u.name}<div class="meta">${u.role === 'admin' ? 'Admin' : 'ART'} · PIN ${u.pin}</div></div>
      <button class="edit" aria-label="Ubah ${u.name}" onclick="startEditUser('${u.id}')">${PENCIL}</button>
      <button class="del" aria-label="Hapus ${u.name}" ${lastAdmin ? 'disabled' : ''} onclick="delUser(this,'${u.id}')">${TRASH}</button></div>`;
    }).join('')}`;
  const eu = db.users.find(u => u.id === editUserId);
  if (eu) { $('uName').value = eu.name; $('uPin').value = eu.pin; $('uRole').value = eu.role; }
}

let editUserId = null;

function startEditUser(id) {
  editUserId = id;
  render();
  $('uName').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function saveUser(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button[type=submit]'); btn.classList.add('loading');
  const args = [$('uName').value.trim(), $('uPin').value.trim(), $('uRole').value];
  try {
    db = editUserId ? await call('updateUser', editUserId, ...args) : await call('addUser', ...args);
    toast(editUserId ? 'Pengguna diperbarui' : 'Pengguna ditambahkan');
    editUserId = null; render();
  } catch (err) { btn.classList.remove('loading'); toast('Gagal, coba lagi'); }
}

function delUser(el, id) {
  const u = db.users.find(u => u.id === id);
  $('delName').textContent = '"' + (u ? u.name : '') + '" tidak akan bisa login lagi.';
  $('delModal').classList.add('show');
  $('delConfirm').onclick = async () => {
    closeDel();
    el.disabled = true;
    try { db = await call('delUser', id); render(); toast('Pengguna dihapus'); }
    catch (e) { el.disabled = false; toast('Gagal, coba lagi'); }
  };
}

function startEdit(id) {
  editId = id;
  render();
  $('fName').focus();
  $('fName').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

let moveSeq = 0;
async function move(id, dir) {
  const i = db.tasks.findIndex(t => t.id === id);
  // optimistic: row moves instantly, server sync happens behind the scenes
  db.tasks.splice(i + dir, 0, db.tasks.splice(i, 1)[0]);
  render();
  const seq = ++moveSeq;
  try {
    const fresh = await call('reorderTasks', db.tasks.map(t => t.id));
    if (seq === moveSeq) { db = fresh; render(); }
  }
  catch (e) { toast('Gagal menyimpan urutan'); }
}

function syncDay() {
  const freq = $('fFreq').value, wrap = $('dayWrap'), sel = $('fDay');
  const needsDay = ['mingguan','bulanan'].includes(freq);
  wrap.style.visibility = needsDay ? 'visible' : 'hidden';
  sel.innerHTML = freq === 'mingguan'
    ? HARI.map((h, i) => `<option value="${i}">${h}</option>`).join('')
    : Array.from({length:28}, (_, i) => `<option value="${i+1}">Tgl ${i+1}</option>`).join('');
}

async function saveTask(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button[type=submit]'); btn.classList.add('loading');
  const args = [$('fName').value.trim(), $('fFreq').value, +$('fDay').value || 0, $('fDesc').value.trim()];
  try {
    db = editId ? await call('updateTask', editId, ...args) : await call('addTask', ...args);
    toast(editId ? 'Perubahan disimpan' : 'Tugas ditambahkan');
    editId = null; render();
  }
  catch (err) { btn.classList.remove('loading'); toast('Gagal, coba lagi'); }
}

function delTask(el, id) {
  const t = db.tasks.find(t => t.id === id);
  $('delName').textContent = '"' + (t ? t.name : '') + '" akan dihapus dari daftar.';
  $('delModal').classList.add('show');
  $('delConfirm').onclick = async () => {
    closeDel();
    el.disabled = true;
    try { db = await call('delTask', id); render(); toast('Tugas dihapus'); }
    catch (e) { el.disabled = false; toast('Gagal, coba lagi'); }
  };
}
function closeDel() { $('delModal').classList.remove('show'); }


function payPreview() {
  const wage = +$('fWage').value || 0, start = $('fStart').value;
  if (!start) { $('payPreview').textContent = 'Tanpa tgl mulai: gaji dihitung dari hari yang tercentang saja.'; return; }
  const today = todayKey();
  const from = start.slice(0, 7) === today.slice(0, 7) ? +start.slice(8) : 1;
  const days = countWorkDays(+today.slice(0, 4), +today.slice(5, 7) - 1, from, +today.slice(8));
  $('payPreview').textContent = `Estimasi bulan ini: ${days} hari kerja (Minggu libur) × ${rupiah(wage)} = ${rupiah(days * wage)}`;
}

async function saveWage(e) {
  e.preventDefault();
  const btn = e.target.querySelector('.btn'); btn.classList.add('loading');
  try { db = await call('setPay', +$('fWage').value, $('fStart').value, $('fHouse').value.trim()); render(); toast('Disimpan'); }
  catch (err) { btn.classList.remove('loading'); toast('Gagal, coba lagi'); }
}

// tombol header = ganti akun (logout ke layar login)
$('modeBtn').onclick = () => {
  if (!localStorage.role) return;
  localStorage.removeItem('role');
  admin = false; editId = null; tab = 'home';
  $('tabHome').classList.add('active'); $('tabReport').classList.remove('active');
  render();
};
document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.remove('show'); }));

// nav mengecil saat scroll ke bawah, kembali normal saat scroll ke atas
let lastY = 0;
window.addEventListener('scroll', () => {
  const y = window.scrollY;
  const nav = document.querySelector('nav');
  if (y > lastY + 8 && y > 60) nav.classList.add('mini');
  else if (y < lastY - 8 || y < 60) nav.classList.remove('mini');
  lastY = y;
}, { passive: true });

call('getState').then(d => {
  db = d;
  admin = localStorage.role === 'admin';
  setTab('home');
})
  .catch(() => { $('app').innerHTML = '<div class="empty">Gagal memuat data. Muat ulang halaman.</div>'; });

// keep ART view in sync with admin changes from another phone
setInterval(async () => {
  if (admin || document.hidden || document.querySelector('.overlay.show')) return;
  try { db = await call('getState'); render(); } catch (e) {}
}, 60000);
</script>
</body>
</html>
